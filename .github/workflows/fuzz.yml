name: Fuzz

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  go-fuzz:
    name: Go Fuzz
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Set up Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.22"

      - name: "Run Go fuzz tests"
        working-directory: go
        run: go test -fuzz=FuzzReverse -fuzztime=30s ./...

  rust-fuzz:
    name: Rust Fuzz
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Install Rust nightly"
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # nightly
        with:
          toolchain: nightly

      - name: "Install cargo-fuzz"
        run: cargo install cargo-fuzz

      - name: "Run Rust fuzz tests"
        working-directory: rust
        run: cargo fuzz run fuzz_reverse -- -max_total_time=30
